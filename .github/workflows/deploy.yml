name: Deploy to Airbase
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build --platform linux/amd64 -t hawkergb-playbook:${{ github.sha }} .

      - name: Deploy to Airbase
        run: |
          npm install -g @airbase/airbase-cli@containers
          echo "${{ secrets.AIRBASE_RC }}" > ~/.airbaserc
          airbase container deploy --project myteam/myapp --image hawkergb-playbook:${{ github.sha }} --yes